services:
  postgres:
    image: postgres:18-alpine
    container_name: fictrio-postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fictrio}
      POSTGRES_USER: ${POSTGRES_USER:-fictrio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fictrio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fictrio-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: fictrio-redis
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_USERNAME: ${REDIS_USERNAME:-fictrio}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-fictrio}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - fictrio-redis-data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--user",
        "default",
        "off",
        "--user",
        "${REDIS_USERNAME:-fictrio}",
        "on",
        ">${REDIS_PASSWORD:-fictrio}",
        "~*",
        "&*",
        "+@all",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --user \"$${REDIS_USERNAME}\" --pass \"$${REDIS_PASSWORD}\" ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fictrio-postgres-data:
  fictrio-redis-data:
