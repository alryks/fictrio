# docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:18-alpine
    container_name: fictrio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - fictrio-postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: fictrio-redis
    restart: unless-stopped
    environment:
      REDIS_USERNAME: ${REDIS_USERNAME:?REDIS_USERNAME is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - fictrio-redis-data:/data
    networks:
      - internal
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--user",
        "default",
        "off",
        "--user",
        "${REDIS_USERNAME}",
        "on",
        ">${REDIS_PASSWORD}",
        "~*",
        "&*",
        "+@all",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --user \"$${REDIS_USERNAME}\" --pass \"$${REDIS_PASSWORD}\" ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: fictrio-api
    container_name: fictrio-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-1h}
      # PrismaService.getDatabaseUrl
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:?TRAEFIK_NETWORK is required}"
      - "traefik.http.routers.fictrio-api.rule=Host(`${DOMAIN:?DOMAIN is required}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.fictrio-api.entrypoints=websecure"
      - "traefik.http.routers.fictrio-api.tls=true"
      - "traefik.http.routers.fictrio-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}"
      - "traefik.http.routers.fictrio-api.priority=20"
      - "traefik.http.routers.fictrio-api.middlewares=fictrio-api-strip"
      - "traefik.http.middlewares.fictrio-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.fictrio-api.loadbalancer.server.port=3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    image: fictrio-web
    container_name: fictrio-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:?TRAEFIK_NETWORK is required}"
      - "traefik.http.routers.fictrio-web.rule=Host(`${DOMAIN:?DOMAIN is required}`)"
      - "traefik.http.routers.fictrio-web.entrypoints=websecure"
      - "traefik.http.routers.fictrio-web.tls=true"
      - "traefik.http.routers.fictrio-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-le}"
      - "traefik.http.routers.fictrio-web.priority=10"
      - "traefik.http.services.fictrio-web.loadbalancer.server.port=3000"

volumes:
  fictrio-postgres-data:
  fictrio-redis-data:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:?TRAEFIK_NETWORK is required}
