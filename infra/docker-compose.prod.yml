# Production stack for fictrio.com. Build context is the repo root (..).
#
#   docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d --build
#
# TLS and routing are handled by an existing Traefik instance on the host.
# api and web join Traefik's network (TRAEFIK_NETWORK) and are exposed through
# the labels below; postgres and redis stay on the private internal network.
#
# Single origin: https://${DOMAIN} serves the web app and proxies
# https://${DOMAIN}/api/* to the API with the /api prefix stripped.

services:
  postgres:
    image: postgres:18-alpine
    container_name: fictrio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - fictrio-postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: fictrio-redis
    restart: unless-stopped
    environment:
      REDIS_USERNAME: ${REDIS_USERNAME:?REDIS_USERNAME is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - fictrio-redis-data:/data
    networks:
      - internal
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--user",
        "default",
        "off",
        "--user",
        "${REDIS_USERNAME}",
        "on",
        ">${REDIS_PASSWORD}",
        "~*",
        "&*",
        "+@all",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --user \"$${REDIS_USERNAME}\" --pass \"$${REDIS_PASSWORD}\" ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: fictrio-api
    container_name: fictrio-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-1h}
      # Consumed by the app (PrismaService.getDatabaseUrl) and by the Redis client.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Used by `prisma migrate deploy` in the entrypoint. Keep the credentials
      # free of URL-reserved characters so this matches PrismaService's URL.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      # /api/* on the apex host, prefix stripped before reaching the API.
      - "traefik.http.routers.fictrio-api.rule=Host(`${DOMAIN:-fictrio.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.fictrio-api.entrypoints=websecure"
      - "traefik.http.routers.fictrio-api.tls=true"
      - "traefik.http.routers.fictrio-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.fictrio-api.priority=20"
      - "traefik.http.routers.fictrio-api.middlewares=fictrio-api-strip"
      - "traefik.http.middlewares.fictrio-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.fictrio-api.loadbalancer.server.port=3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://fictrio.com/api}
    image: fictrio-web
    container_name: fictrio-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      # Apex host serves the web app (lower priority than the /api router).
      - "traefik.http.routers.fictrio-web.rule=Host(`${DOMAIN:-fictrio.com}`)"
      - "traefik.http.routers.fictrio-web.entrypoints=websecure"
      - "traefik.http.routers.fictrio-web.tls=true"
      - "traefik.http.routers.fictrio-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.fictrio-web.priority=10"
      - "traefik.http.services.fictrio-web.loadbalancer.server.port=3000"
      # Redirect www.${DOMAIN} to the canonical apex host so cookies stay on one origin.
      - "traefik.http.routers.fictrio-www.rule=Host(`www.${DOMAIN:-fictrio.com}`)"
      - "traefik.http.routers.fictrio-www.entrypoints=websecure"
      - "traefik.http.routers.fictrio-www.tls=true"
      - "traefik.http.routers.fictrio-www.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.fictrio-www.middlewares=fictrio-www-redirect"
      - "traefik.http.middlewares.fictrio-www-redirect.redirectregex.regex=^https?://www\\.(.+)"
      - "traefik.http.middlewares.fictrio-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.fictrio-www-redirect.redirectregex.permanent=true"

volumes:
  fictrio-postgres-data:
  fictrio-redis-data:

networks:
  internal:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
